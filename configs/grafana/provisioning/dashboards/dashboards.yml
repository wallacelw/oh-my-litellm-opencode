# ─────────────────────────────────────────────────────────────────────────────
# Grafana dashboard auto-provisioning
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: "oh-my-litellm-opencode"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
