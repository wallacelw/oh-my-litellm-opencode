# ─────────────────────────────────────────────────────────────────────────────
# Prometheus configuration for oh-my-litellm-opencode
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "oh-my-litellm-opencode"

rule_files:
  - /etc/prometheus/rules.yml
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "litellm"
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
