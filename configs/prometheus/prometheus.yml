# ─────────────────────────────────────────────────────────────────────────────
# Prometheus configuration for oh-my-coding-maas-gateway
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "oh-my-coding-maas-gateway"

scrape_configs:
  - job_name: "litellm"
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
