# ─────────────────────────────────────────────────────────────────────────────
# Prometheus recording rules — 7-day rolling baselines for dynamic thresholds
# ─────────────────────────────────────────────────────────────────────────────

groups:
  - name: litellm_baselines
    interval: 5m
    rules:
      # TTFT P95 baseline (7-day rolling average)
      - record: litellm:ttft_p95:7d_avg
        expr: |
          avg_over_time(
            histogram_quantile(0.95,
              sum by (le, model) (rate(litellm_llm_api_time_to_first_token_metric_bucket[5m]))
            )[7d:5m]
          )

      # TPOT P50 baseline (7-day rolling average)
      - record: litellm:tpot_p50:7d_avg
        expr: |
          avg_over_time(
            histogram_quantile(0.50,
              sum by (le, litellm_model_name) (rate(litellm_deployment_latency_per_output_token_bucket[5m]))
            )[7d:5m]
          )

      # RPM baseline (7-day rolling average)
      - record: litellm:rpm:7d_avg
        expr: |
          avg_over_time(
            (sum(rate(litellm_proxy_total_requests_metric_total[5m])) * 60)[7d:5m]
          )

      # TPM baseline (7-day rolling average)
      - record: litellm:tpm:7d_avg
        expr: |
          avg_over_time(
            (sum(rate(litellm_total_tokens_metric_total[5m])) * 60)[7d:5m]
          )
