x-default: &default
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  litellm:
    <<: *default
    container_name: litellm_proxy
    image: ghcr.io/berriai/litellm:v1.89.3
    ports:
      - "4000:4000"
    volumes:
      - ./assets/config/litellm/litellm_config.yaml:/app/config.yaml:ro
    environment:
      DATABASE_URL: "postgresql://llmproxy:${DB_PASSWORD}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://openlit:4318"
      LITELLM_OTEL_INTEGRATION_ENABLE_METRICS: "true"
      LITELLM_OTEL_INTEGRATION_ENABLE_EVENTS: "true"
    # env_file passes all .env vars to the container.
    # Acceptable — vars are container-local and not exposed.
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
          cpus: "0.5"
    command:
      - "--config=/app/config.yaml"

  db:
    <<: *default
    image: postgres:16-alpine
    container_name: litellm_pg_db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

  clickhouse:
    <<: *default
    image: clickhouse/clickhouse-server:24.4.1
    container_name: litellm_clickhouse
    environment:
      CLICKHOUSE_PASSWORD: ${OPENLIT_DB_PASSWORD:?OPENLIT_DB_PASSWORD must be set in .env}
      CLICKHOUSE_USER: default
      CLICKHOUSE_DATABASE: openlit
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: "true"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./assets/config/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom-config.xml:ro
      - ./assets/config/clickhouse/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=default --password=${OPENLIT_DB_PASSWORD:?} --query='SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 100s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

  openlit:
    <<: *default
    image: ghcr.io/openlit/openlit:1.22.0
    container_name: litellm_openlit
    environment:
      TELEMETRY_ENABLED: "true"
      INIT_DB_HOST: clickhouse
      INIT_DB_PORT: 8123
      INIT_DB_DATABASE: openlit
      INIT_DB_USERNAME: default
      INIT_DB_PASSWORD: ${OPENLIT_DB_PASSWORD:?OPENLIT_DB_PASSWORD must be set in .env}
      SQLITE_DATABASE_URL: "file:/app/client/data/data.db"
      PORT: "3000"
      DOCKER_PORT: "3000"
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - openlit_data:/app/client/data
      - ./assets/config/openlit/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

volumes:
  postgres_data:
    name: litellm_postgres_data
  clickhouse_data:
    name: litellm_clickhouse_data
  openlit_data:
    name: litellm_openlit_data
